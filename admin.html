<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Magician Bhuvan Bhaskar</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
background:#0A0A0A;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#111;
border:1px solid #D4AF37;
border-radius:20px;
padding:20px;
margin-bottom:20px;
}

h1,h2{
color:#D4AF37;
margin-bottom:15px;
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:12px;
background:#1a1a1a;
border:none;
border-radius:10px;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.gold{
background:#D4AF37;
color:black;
}

.red{
background:#ff4444;
color:white;
}

#dashboard{
display:none;
}
</style>
</head>
<body>

<div class="container">

<div id="loginBox" class="card">
<h1>Admin Login</h1>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="gold" onclick="login()">Login</button>

<p id="loginStatus"></p>
</div>

<div id="dashboard">

<div class="card">
<h2>Website Information</h2>

<input id="name" placeholder="Name">
<textarea id="bio" placeholder="Bio"></textarea>

<input id="shows" type="number" placeholder="Shows">
<input id="cities" type="number" placeholder="Cities">
<input id="years" type="number" placeholder="Years">

<input id="phone" placeholder="Phone">
<input id="instagram" placeholder="Instagram">
<input id="youtube" placeholder="YouTube">

<button class="gold" onclick="saveData()">Save Changes</button>

<p id="saveStatus"></p>
</div>

<div class="card">
<h2>Photo Upload (Cloudinary)</h2>

<input type="file" id="photoFile" accept="image/*">

<button class="gold">
Upload Photo
</button>
</div>

<div class="card">
<h2>Video Upload (Cloudinary)</h2>

<input type="file" id="videoFile" accept="video/*">

<button class="gold">
Upload Video
</button>
</div>

<div class="card">
<button class="red" onclick="logout()">Logout</button>
</div>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
