<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | Magician Bhuvan Bhaskar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0A0A0A;
color:white;
min-height:100vh;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(212,175,55,0.3);
border-radius:20px;
padding:25px;
margin-bottom:20px;
}

.title{
text-align:center;
color:#D4AF37;
font-size:32px;
font-weight:700;
margin-bottom:20px;
}

.subtitle{
color:#D4AF37;
font-size:20px;
margin-bottom:15px;
}

input,
textarea{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:12px;
background:#1a1a1a;
color:white;
font-size:15px;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:600;
margin-top:10px;
}

.login-btn{
background:#D4AF37;
color:black;
}

.save-btn{
background:#D4AF37;
color:black;
}

.logout-btn{
background:#ff4444;
color:white;
}

#dashboard{
display:none;
}

.status{
margin-top:10px;
text-align:center;
font-weight:600;
}

</style>
</head>
<body>

<div class="container">

<!-- LOGIN -->

<div id="loginBox" class="card">

<h1 class="title">Admin Login</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button class="login-btn" onclick="login()">
Login
</button>

<div id="loginStatus" class="status"></div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="card">

<h2 class="subtitle">Website Information</h2>

<input type="text" id="name" placeholder="Name">

<textarea id="bio" placeholder="Bio"></textarea>

<input type="number" id="shows" placeholder="Shows">

<input type="number" id="cities" placeholder="Cities">

<input type="number" id="years" placeholder="Years">

<input type="text" id="phone" placeholder="Phone">

<input type="text" id="instagram" placeholder="Instagram">

<input type="text" id="youtube" placeholder="YouTube">

<button class="save-btn" onclick="saveData()">
Save Changes
</button>

<div id="saveStatus" class="status"></div>

</div>

<div class="card">

<h2 class="subtitle">Cloudinary (Future)</h2>

<p>
Photo Upload<br>
Video Upload<br>
Hero Image Change
</p>

</div>

<div class="card">

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
