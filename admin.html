<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - Magician Bhuvan Bhaskar</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0A0A0A;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:#111;
border:1px solid #D4AF37;
border-radius:20px;
padding:20px;
margin-bottom:20px;
}

h1,h2{
color:#D4AF37;
margin-bottom:15px;
}

input,
textarea{
width:100%;
padding:12px;
margin-bottom:12px;
background:#1a1a1a;
border:none;
border-radius:10px;
color:white;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.gold{
background:#D4AF37;
color:black;
}

.red{
background:#ff4444;
color:white;
}

.green{
background:#22c55e;
color:white;
}

#dashboard{
display:none;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.preview{
width:100%;
max-height:250px;
object-fit:cover;
border-radius:12px;
border:1px solid #333;
margin-top:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
margin-top:15px;
}

.item{
background:#1a1a1a;
padding:10px;
border-radius:12px;
}

.item img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.item video{
width:100%;
border-radius:10px;
}

.item button{
margin-top:10px;
}

.statBox{
background:#1a1a1a;
padding:15px;
border-radius:12px;
text-align:center;
}

.statValue{
font-size:28px;
font-weight:bold;
color:#D4AF37;
}

@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}
}

</style>
</head>
<body>

<div class="container">

<!-- LOGIN -->

<div id="loginBox" class="card">

<h1>Admin Login</h1>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button
class="gold"
onclick="login()">
Login
</button>

<p id="loginStatus"></p>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<!-- WEBSITE INFO -->

<div class="card">

<h2>Website Information</h2>

<input id="name" placeholder="Name">

<textarea
id="bio"
placeholder="Bio"></textarea>

<div class="grid">

<input
id="shows"
type="number"
placeholder="Shows">

<input
id="cities"
type="number"
placeholder="Cities">

<input
id="years"
type="number"
placeholder="Years">

<input
id="phone"
placeholder="Phone">

</div>

<input
id="instagram"
placeholder="Instagram URL">

<input
id="youtube"
placeholder="YouTube URL">

<button
class="gold"
onclick="saveData()">
Save Changes
</button>

<p id="saveStatus"></p>

</div>

<!-- HERO IMAGE -->

<div class="card">

<h2>Hero Image</h2>

<input
type="file"
id="heroFile"
accept="image/*">

<button
class="gold"
onclick="uploadHero()">
Upload Hero Image
</button>

<img
id="heroPreview"
class="preview"
style="display:none;">

<p id="heroStatus"></p>

</div>

<!-- PHOTO GALLERY -->

<div class="card">

<h2>Photo Gallery</h2>

<input
type="file"
id="photoFile"
accept="image/*">

<button
class="gold"
onclick="uploadPhoto()">
Upload Photo
</button>

<p id="photoStatus"></p>

<div
id="photoGallery"
class="gallery">
</div>

</div>

<!-- VIDEO GALLERY -->

<div class="card">

<h2>Video Gallery</h2>

<input
type="file"
id="videoFile"
accept="video/*">

<button
class="gold"
onclick="uploadVideo()">
Upload Video
</button>

<p id="videoStatus"></p>

<div
id="videoGallery"
class="gallery">
</div>

</div>

<!-- ANALYTICS -->

<div class="card">

<h2>Analytics</h2>

<div class="grid">

<div class="statBox">
<div class="statValue" id="totalVisits">0</div>
<div>Total Visits</div>
</div>

<div class="statBox">
<div class="statValue" id="uniqueVisitors">0</div>
<div>Unique Visitors</div>
</div>

</div>

</div>

<!-- PASSWORD -->

<div class="card">

<h2>Change Password</h2>

<input
type="password"
id="currentPassword"
placeholder="Current Password">

<input
type="password"
id="newPassword"
placeholder="New Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm New Password">

<button
class="green"
onclick="changePassword()">
Change Password
</button>

<p id="passwordStatus"></p>

</div>

<!-- LOGOUT -->

<div class="card">

<button
class="red"
onclick="logout()">
Logout
</button>

</div>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
